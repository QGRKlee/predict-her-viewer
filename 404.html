<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PredictHer - App Preview</title>
  <link rel="icon" href="app/brand/butterfly-logo.jpg?v=72ba105">
  <style>
    :root {
      --phone-w: 390px;
      --phone-h: 844px;
      --bezel: 14px;
      --radius: 56px;
      --brand-primary: #e03060;
      --brand-soft: #f07090;
      --brand-deep: #a02050;
      --brand-ink: #2b1020;
      --brand-line: rgba(224, 48, 96, 0.18);
    }
    * { box-sizing: border-box; }
    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #ffffff;
      color: var(--brand-ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px 16px;
      background:
        radial-gradient(circle at 50% 0%, rgba(240, 112, 144, 0.14), transparent 34%),
        #ffffff;
    }
    .preview-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      color: var(--brand-deep);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }
    .device {
      position: relative;
      width: calc(var(--phone-w) + var(--bezel) * 2);
      height: calc(var(--phone-h) + var(--bezel) * 2);
      max-height: calc(100vh - 96px);
      aspect-ratio: calc(var(--phone-w) + var(--bezel) * 2) / calc(var(--phone-h) + var(--bezel) * 2);
      padding: var(--bezel);
      border-radius: var(--radius);
      background:
        linear-gradient(160deg, #ffffff 0%, #f7edf1 42%, #2b1020 100%);
      box-shadow:
        0 2px 6px rgba(43, 16, 32, 0.12),
        0 30px 70px rgba(160, 32, 80, 0.22),
        inset 0 0 0 1px rgba(160, 32, 80, 0.14);
    }
    .device::before {
      content: "";
      position: absolute;
      left: -2px;
      top: 150px;
      width: 3px;
      height: 64px;
      border-radius: 3px;
      background: #2b1020;
      box-shadow: 0 84px 0 #2b1020, 0 -96px 0 #2b1020;
    }
    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: calc(var(--radius) - var(--bezel));
      background: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.42);
    }
    .screen iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }
    .hint {
      max-width: var(--phone-w);
      margin: 0;
      color: rgba(43, 16, 32, 0.48);
      font-size: 11px;
      line-height: 1.45;
      text-align: center;
    }
    @media (max-height: 920px) {
      :root { --radius: 46px; }
    }
  </style>
</head>
<body>
  <p class="preview-title">
    <span>PredictHer App Preview</span>
  </p>
  <div class="device" role="img" aria-label="iPhone-style preview of the PredictHer app">
    <div class="screen">
      <iframe src="app/?v=72ba105" title="PredictHer app" allow="accelerometer; gyroscope; geolocation"></iframe>
    </div>
  </div>
  <p class="hint">Browser preview only. Native features such as push, health, and purchases require a device. The app runs inside an iPhone-sized 390 x 844 viewport.</p>
</body>
</html>
