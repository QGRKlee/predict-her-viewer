<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PredictHer — App Preview</title>
  <link rel="icon" href="app/logo.png">
  <style>
    :root{
      --phone-w:390px;     /* iPhone logical width */
      --phone-h:844px;     /* iPhone logical height */
      --bezel:14px;
      --radius:56px;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:18px;
      padding:28px 16px;
      background:radial-gradient(1200px 800px at 50% -10%,#2a2433 0%,#15121b 55%,#0c0a11 100%);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
      color:#e7e2ef;
    }
    .preview-title{
      font-size:13px;letter-spacing:1.5px;text-transform:uppercase;
      color:rgba(231,226,239,.6);font-weight:600;margin:0;
    }
    /* Device frame */
    .device{
      position:relative;
      width:calc(var(--phone-w) + var(--bezel)*2);
      height:calc(var(--phone-h) + var(--bezel)*2);
      max-height:calc(100vh - 96px);
      aspect-ratio:calc(var(--phone-w) + var(--bezel)*2) / calc(var(--phone-h) + var(--bezel)*2);
      background:linear-gradient(160deg,#3a3a3e 0%,#0f0f12 45%,#1c1c20 100%);
      border-radius:var(--radius);
      padding:var(--bezel);
      box-shadow:
        0 2px 6px rgba(0,0,0,.5),
        0 30px 70px rgba(0,0,0,.65),
        inset 0 0 0 2px rgba(255,255,255,.06);
    }
    .device::before{ /* side buttons hint */
      content:"";position:absolute;left:-2px;top:150px;width:3px;height:64px;
      border-radius:3px;background:#1a1a1e;box-shadow:0 84px 0 #1a1a1e,0 -96px 0 #1a1a1e;
    }
    .screen{
      position:relative;
      width:100%;height:100%;
      background:#000;
      border-radius:calc(var(--radius) - var(--bezel));
      overflow:hidden;
    }
    .notch{
      position:absolute;top:0;left:50%;transform:translateX(-50%);
      width:160px;height:30px;
      background:#000;
      border-radius:0 0 18px 18px;
      z-index:3;pointer-events:none;
    }
    .screen iframe{
      position:absolute;inset:0;
      width:100%;height:100%;
      border:0;
      background:#000;
    }
    .hint{font-size:11px;color:rgba(231,226,239,.35);margin:0;text-align:center;max-width:var(--phone-w)}
    @media (max-height:920px){ :root{ --radius:46px } }
  </style>
</head>
<body>
  <p class="preview-title">PredictHer · App Preview</p>
  <div class="device" role="img" aria-label="iPhone-style preview of the PredictHer app">
    <div class="screen">
      <div class="notch"></div>
      <iframe src="app/" title="PredictHer app" allow="accelerometer; gyroscope; geolocation"></iframe>
    </div>
  </div>
  <p class="hint">Browser preview only — native features (push, health, purchases) require a device. The app runs inside an iPhone-sized 390×844 viewport.</p>
</body>
</html>
